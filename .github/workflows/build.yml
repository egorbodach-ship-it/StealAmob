name: Build Brainrot Plugins

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build all plugins
        run: mvn -B -ntp clean package

      - name: Collect jars
        run: |
          mkdir -p dist
          find . -path '*/target/*.jar' ! -name 'original-*.jar' -exec cp {} dist/ \;
          ls -la dist

      - name: Upload plugin jars
        uses: actions/upload-artifact@v4
        with:
          name: brainrot-plugins
          path: dist/*.jar
          if-no-files-found: error
